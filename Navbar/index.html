<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <nav>
        <div class="logo">
            <a href="#">
                <img src="./images/catering.gif" alt="Catering Logo">
                <span id="home">Home</span>
            </a>
        </div>
        <div class="nav-items">
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Chefs</a></li>
                <li><a href="#">Reservation</a></li>
                <li><a href="#">Reviews</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
        <div class="btns">
            <span id="search">
                <img src="./images/search.gif" alt="animated search icon">
            </span>
            <button>
                <span id="order-icon">
                    <img src="./images/shopping-list.gif" alt="animated order icon">
                </span>
                Order Now</button>
        </div>
    </nav>

</body>

</html>
